name: Claude Code Agent
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Claude Code'
        required: true
      callback_url:
        description: 'Webhook URL to call on completion'
        required: false
      project_id:
        description: 'Project ID for callback context'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 200
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep,Task"
          show_full_output: "true"

      - name: Extract execution stats
        id: stats
        if: always() && steps.claude.outputs.execution_file != ''
        continue-on-error: true
        run: |
          EXECUTION_FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -f "$EXECUTION_FILE" ]; then
            RESULT=$(jq '.[-1] | select(.type == "result")' "$EXECUTION_FILE" 2>/dev/null)
            if [ -n "$RESULT" ]; then
              echo "cost_usd=$(echo "$RESULT" | jq -r '.total_cost_usd // empty')" >> $GITHUB_OUTPUT
              echo "num_turns=$(echo "$RESULT" | jq -r '.num_turns // empty')" >> $GITHUB_OUTPUT
              echo "duration_ms=$(echo "$RESULT" | jq -r '.duration_ms // empty')" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload execution log to Supabase
        id: upload-log
        if: always() && steps.claude.outputs.execution_file != ''
        continue-on-error: true
        run: |
          EXECUTION_FILE="${{ steps.claude.outputs.execution_file }}"
          if [ ! -f "$EXECUTION_FILE" ]; then
            echo "Execution file not found, skipping upload"
            exit 0
          fi

          LOG_PATH="${{ inputs.project_id }}/run-$(date +%s).json"

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/agent-logs/${LOG_PATH}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_SECRET_KEY }}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @"$EXECUTION_FILE")

          RESPONSE_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Log uploaded successfully to agent-logs/${LOG_PATH}"
            echo "log_path=${LOG_PATH}" >> $GITHUB_OUTPUT
          else
            echo "Failed to upload log (HTTP $HTTP_CODE)"
            echo "Response: $RESPONSE_BODY"
            echo "log_path=" >> $GITHUB_OUTPUT
          fi

      - name: Notify completion
        if: success() && inputs.callback_url != ''
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.INSTANTCLI_GITHUB_CALLBACK_SECRET }}
          PROJECT_ID: ${{ inputs.project_id }}
          PROMPT: ${{ inputs.prompt }}
          LOG_PATH: ${{ steps.upload-log.outputs.log_path }}
          COST_USD: ${{ steps.stats.outputs.cost_usd }}
          NUM_TURNS: ${{ steps.stats.outputs.num_turns }}
          DURATION_MS: ${{ steps.stats.outputs.duration_ms }}
        run: |
          PAYLOAD=$(jq -n \
            --arg project_id "$PROJECT_ID" \
            --arg status "completed" \
            --arg prompt "$PROMPT" \
            --arg log_path "$LOG_PATH" \
            --arg cost "$COST_USD" \
            --arg turns "$NUM_TURNS" \
            --arg duration "$DURATION_MS" \
            '{
              project_id: $project_id,
              status: $status,
              prompt: $prompt,
              execution_log_path: $log_path,
              cost_usd: (if $cost != "" then ($cost | tonumber) else null end),
              num_turns: (if $turns != "" then ($turns | tonumber) else null end),
              duration_ms: (if $duration != "" then ($duration | tonumber) else null end)
            }')
          RESPONSE=$(curl -s -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -d "$PAYLOAD")
          echo "Webhook response: $RESPONSE"

      - name: Notify failure
        if: failure() && inputs.callback_url != ''
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CALLBACK_SECRET: ${{ secrets.INSTANTCLI_GITHUB_CALLBACK_SECRET }}
          PROJECT_ID: ${{ inputs.project_id }}
          PROMPT: ${{ inputs.prompt }}
          LOG_PATH: ${{ steps.upload-log.outputs.log_path }}
          COST_USD: ${{ steps.stats.outputs.cost_usd }}
          NUM_TURNS: ${{ steps.stats.outputs.num_turns }}
          DURATION_MS: ${{ steps.stats.outputs.duration_ms }}
        run: |
          PAYLOAD=$(jq -n \
            --arg project_id "$PROJECT_ID" \
            --arg status "failed" \
            --arg prompt "$PROMPT" \
            --arg log_path "$LOG_PATH" \
            --arg cost "$COST_USD" \
            --arg turns "$NUM_TURNS" \
            --arg duration "$DURATION_MS" \
            '{
              project_id: $project_id,
              status: $status,
              prompt: $prompt,
              execution_log_path: $log_path,
              cost_usd: (if $cost != "" then ($cost | tonumber) else null end),
              num_turns: (if $turns != "" then ($turns | tonumber) else null end),
              duration_ms: (if $duration != "" then ($duration | tonumber) else null end)
            }')
          RESPONSE=$(curl -s -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CALLBACK_SECRET" \
            -d "$PAYLOAD")
          echo "Webhook response: $RESPONSE"
